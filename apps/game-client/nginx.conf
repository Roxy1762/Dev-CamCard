# ── Dev-CamCard 前端静态站点 ────────────────────────────────────────────────
# 同时承担：
#   1. 托管 Phaser 构建产物（lobby + game）
#   2. /matchmake/*  反代到 server（Colyseus seat reservation，HTTP）
#   3. /<processId>/<roomId> 反代到 server（Colyseus 实际 WS 握手）
#   4. /api/* 反代到 server（对局列表 + 卡牌目录）
#   5. /admin/ 反代到 admin 容器（运营后台同域访问，公网部署只放行 80/443 即可）
#
# 公网部署只需放行游戏前端容器的端口（默认 80 → 宿主机 3000）。
# server:2567 与 admin:3001 都可以保持仅在 docker 内部网络访问。
#
# ── 关于 WebSocket 路径（重要） ──────────────────────────────────────────────
# Colyseus 0.15 客户端实际打开的 ws URL 形如：
#     wss://<host>/<processId>/<roomId>?sessionId=...
# 其中 processId 是服务端进程的随机 id（Utils.generateId()），并不是 room name。
# 旧版本配置只反代 /game_room，导致 ws 握手永远落到下面的 try_files → index.html，
# 浏览器一直等不到 101 Switching Protocols，最终触发客户端 8000ms 硬超时：
#     "加入房间 超时（8000ms 无响应）"
# 现在改为按 Colyseus 实际路径形态做正则匹配，并显式带上 Upgrade/Connection 头。

# nginx 要求 Connection: upgrade 仅在请求带 Upgrade 头时设置；这里用 map 实现。
# conf.d/*.conf 在 http {} 上下文里被 include，因此 map 写在 server 块外层是合法的。
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream devcamcard_server {
  server server:2567;
}

upstream devcamcard_admin {
  server admin:3001;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 一些反向代理（HTTPS 前置）会传更长的 ws 升级头；放宽 buffer 上限。
  large_client_header_buffers 4 16k;

  # 静态资源缓存（前缀匹配，^~ 抢占下方的正则匹配）
  location ^~ /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # 只读 API（对局 + 卡牌）：同域调用免跨域
  location ^~ /api/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://devcamcard_server/health;
  }

  location = /health/db {
    proxy_pass http://devcamcard_server/health/db;
  }

  # ── Colyseus 同域反代（默认开启） ────────────────────────────────────────
  # 1) seat reservation：HTTP POST /matchmake/<method>/<roomName>
  #    用 ^~ 抢占下面的两段正则，避免 /matchmake/joinOrCreate/game_room 被
  #    误判为 "/<processId>/<roomId>" 而走 ws 握手。
  location ^~ /matchmake/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 2) 实际 ws 握手：/<processId>/<roomId>
  #    Colyseus 服务端用 /\/[a-zA-Z0-9_\-]+\/([a-zA-Z0-9_\-]+)$/ 解析路径；
  #    这里用同样的字符集 + 长度下限（默认 nanoid 9 位，留宽到 6~21）匹配两段
  #    路径，避免把 SPA 内部路径如 /lobby/login 也吞掉。
  location ~ "^/[A-Za-z0-9_\-]{6,21}/[A-Za-z0-9_\-]{6,21}/?$" {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── 运营后台同域反代（默认开启） ───────────────────────────────────────
  # 浏览器访问 https://<host>/admin/ → 容器内 admin:3001
  # 前提：admin 容器以 NEXT_BASE_PATH=/admin 启动，Next.js 会把全部路由 +
  # _next/* 静态资源都挂到 /admin 下，反代时不需要 strip prefix。
  # 这样公网部署只放行 80/443，admin:3001 不必单独暴露。
  # ^~ 必须，否则 /admin/_next/static/<hash>/<file> 会落进上面的 ws 正则。
  location ^~ /admin {
    proxy_pass http://devcamcard_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /admin;
  }

  # Phaser SPA：所有未命中文件 fallback 到 index.html
  # 放在最后；上面所有 ^~ 前缀与正则都会优先于这里。
  location / {
    try_files $uri $uri/ /index.html;
  }
}
