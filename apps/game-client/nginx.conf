# ── Dev-CamCard 前端静态站点 ────────────────────────────────────────────────
# 同时承担：
#   1. 托管 Phaser 构建产物（lobby + game）
#   2. /matchmake + /game_room 反代到 server，避免暴露 :2567
#   3. /api/* 反代到 server（对局列表 + 卡牌目录）
#   4. /admin/ 反代到 admin 容器（运营后台同域访问，公网部署只放行 80/443 即可）
#
# 公网部署只需放行游戏前端容器的端口（默认 80 → 宿主机 3000）。
# server:2567 与 admin:3001 都可以保持仅在 docker 内部网络访问。

upstream devcamcard_server {
  server server:2567;
}

upstream devcamcard_admin {
  server admin:3001;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 一些反向代理（HTTPS 前置）会传更长的 ws 升级头；放宽 buffer 上限。
  large_client_header_buffers 4 16k;

  # Phaser SPA：所有未命中文件 fallback 到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 静态资源缓存
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # 只读 API（对局 + 卡牌）：同域调用免跨域
  location /api/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://devcamcard_server/health;
  }

  location = /health/db {
    proxy_pass http://devcamcard_server/health/db;
  }

  # ── Colyseus 同域反代（默认开启） ────────────────────────────────────────
  # 客户端不再需要单独暴露 :2567，浏览器按 window.location 推导 ws/wss host。
  location /matchmake/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~ ^/(game_room) {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── 运营后台同域反代（默认开启） ───────────────────────────────────────
  # 浏览器访问 https://<host>/admin/ → 容器内 admin:3001
  # 前提：admin 容器以 NEXT_BASE_PATH=/admin 启动，Next.js 会把全部路由 +
  # _next/* 静态资源都挂到 /admin 下，反代时不需要 strip prefix。
  # 这样公网部署只放行 80/443，admin:3001 不必单独暴露。
  location /admin {
    proxy_pass http://devcamcard_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /admin;
  }
}
