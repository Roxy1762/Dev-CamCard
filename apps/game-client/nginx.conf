# ── Dev-CamCard 前端静态站点 ────────────────────────────────────────────────
# 默认只托管 Phaser 构建产物，客户端直接通过 VITE_SERVER_URL 指向 server。
# 若希望同域部署（单端口 80/443），把 VITE_SERVER_URL 构建参数留空，
# 并启用下方 /matchmake + /game_room 的反代块，让 ws 走同一个 host。

upstream devcamcard_server {
  server server:2567;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Phaser SPA：所有未命中文件 fallback 到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 静态资源缓存
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  # 只读对局 API（便于同域调用，不需要跨域）
  location /api/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://devcamcard_server/health;
  }

  # ── Colyseus 同域反代（可选） ─────────────────────────────────────────────
  # 启用时：构建 game-client 时把 VITE_SERVER_URL 设为空字符串，
  # 客户端会根据 window.location 自动选择 ws/wss + 同 host。
  location /matchmake/ {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~ ^/(game_room) {
    proxy_pass http://devcamcard_server;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
